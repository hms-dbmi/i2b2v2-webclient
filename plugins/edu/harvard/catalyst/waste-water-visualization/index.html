<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waste Water Visualization</title>
    <script type="text/javascript" src="js/i2b2-loader.js" ></script>
    <script type="text/javascript" src="js/waste-water-visualization-main.js" ></script>
    <script src="js/output.js"></script>
    <script src="js/d3v7.min.js"></script>
    <script src="js/d3-color.v1.min.js"></script>
    <script src="js/d3-interpolate.v1.min.js"></script>
    <script src="js/d3-scale-chromatic.v1.min.js"></script>
    <script src="js/d3-array.v3.min.js"></script>
      <!-- Bootstrap CSS only -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/waste-water-visualization-main.css">
</head>
<body>
    <div class="container">
        <div class="row mb-3">
            <div class="col-6"><h1 class="h4">Waste Water Previous Query Visualizer</h1></div>
            <div class="col-3"><a href="plugin-info.html">Plugin Info</a></div>
            <div class="col-3"><input type="button" onclick="window.location.reload()" value="Reload Plugin"></div>
        </div>  
        <form>
            <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="startDate" class="form-label">Start Date</label>
                <input type="date" class="form-control" id="startDate" name="startDate" required>
            </div>
            <div class="col-md-4">
                <label for="endDate" class="form-label">End Date</label>
                <input type="date" class="form-control" id="endDate" name="endDate" required>
            </div>
            <div class="col-md-4">
                <button type="button" id="visualizationTrigger" class="btn btn-primary w-100">Start Visualization</button>
            </div>
            </div>
        </form>       
     
        <div id="WasteWaterVisualization-psmaindiv">
            drop a patient set here   
            <div class="WasteWaterVisualization-psmaindiv-content"></div>    
        </div>
        <div id="wasteWaterChart" class="WasteWaterVisualization-psmaindiv-graphs"></div>
    </div>

</body>
</html>
